<div class="analytics-container">

  <header class="analytics-header">
    <button class="back-btn" (click)="goBack()">← Geri</button>
    <h1>Analizlerim</h1>
  </header>

  <main class="analytics-main">

    <div class="loading" *ngIf="isLoading">Veriler yükleniyor...</div>

    <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

    <app-spending-chart
      *ngIf="!isLoading && transactions.length > 0"
      [transactions]="transactions">
    </app-spending-chart>

    <div class="empty-state" *ngIf="!isLoading && transactions.length === 0 && !errorMessage">
      Analiz için yeterli işlem verisi bulunamadı.
    </div>

  </main>
</div>
